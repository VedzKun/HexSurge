services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: pulsedrop
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_preload_libraries=h3

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: .
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/pulsedrop
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data: